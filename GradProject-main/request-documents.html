<script>
  const requests = {
    enrollment: {
      title: "Enrollment Certificate",
      items: ["Student National ID", "Parent National ID (if required)", "Payment Receipt", "Student ID / Student Code"]
    },
    metro: {
      title: "Metro Subscription",
      items: ["Student ID", "Parent ID", "Personal Photo (4×6)", "Recent Enrollment Certificate", "Metro Application Form"]
    },
    military: {
      title: "Military Status Document",
      items: ["National ID", "Birth Certificate", "3 Personal Photos", "Recent Enrollment Certificate", "Military Card (if available)"]
    },
    transcript: {
      title: "Transcript",
      items: ["National ID", "Student Card", "Payment Receipt", "Official Request Form"]
    },
    idcard: {
      title: "Student ID Card",
      items: ["Personal Photo", "National ID", "Payment Receipt", "Registration Form"]
    },
    transfer: {
      title: "College Transfer",
      items: ["Enrollment Statement", "Grade Report", "National ID", "Official Transfer Form"]
    },
    excuse: {
      title: "Semester Excuse",
      items: ["Official Request", "National ID", "Excuse Reason Document", "Enrollment Statement"]
    }
  };

  // ملء القايمة الأولى
  const quistSelected = document.querySelectorAll('.custom-select')[0].querySelector('.select-selected');
  const quistItems = document.querySelectorAll('.custom-select')[0].querySelector('.select-items');

  Object.keys(requests).forEach(key => {
    const div = document.createElement('div');
    div.textContent = requests[key].title;
    div.dataset.value = key;
    quistItems.appendChild(div);
  });

  // ملء القايمة الثانية افتراضيًا
  const type1Selected = document.getElementById('type1-selected');
  const type1Items = document.getElementById('type1-items');
  function updateType1(key = 'enrollment') {
    type1Items.innerHTML = '';
    requests[key].items.forEach(item => {
      const div = document.createElement('div');
      div.textContent = item;
      type1Items.appendChild(div);
    });
    type1Selected.textContent = 'Documents';
  }
  updateType1();

  // تفعيل Custom Selects
  document.querySelectorAll('.custom-select').forEach((select, index) => {
    const selected = select.querySelector('.select-selected');
    const items = select.querySelector('.select-items');

    selected.addEventListener('click', () => {
      selected.classList.toggle('active');
      items.classList.toggle('show');
    });

    items.querySelectorAll('div').forEach(option => {
      option.addEventListener('click', () => {
        selected.textContent = option.textContent;
        selected.innerHTML = option.textContent ;
        items.classList.remove('show');
        selected.classList.remove('active');

        // لو ده القايمة الأولى → غير الثانية
        if (index === 0) {
          const value = option.dataset.value;
          updateType1(value);
        }
      });
    });
  });

  // إغلاق القوايم لما تضغط بره
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.custom-select')) {
      document.querySelectorAll('.select-items').forEach(i => i.classList.remove('show'));
      document.querySelectorAll('.select-selected').forEach(s => s.classList.remove('active'));
    }
  });
</script>
